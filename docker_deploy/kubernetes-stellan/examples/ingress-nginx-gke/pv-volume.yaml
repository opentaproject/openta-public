apiVersion: v1
kind: PersistentVolume
# https://kubernetes.io/docs/tasks/configure-pod-container/configure-persistent-volume-storage/
metadata:
  name: task-pv-volume
  labels:
    type: local
spec:
  storageClassName: manual
  capacity:
    storage: 10Gi
  claimRef:
    namespace: default
    name: pv-volume-claim
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/mnt/data"
