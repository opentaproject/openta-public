apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  name: default-http-backend-ingress
  namespace: ingress-nginx
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  tls:
    - secretName: default-opentaproject-org-tls
      hosts:
        - default.opentaproject.org
  rules:
    - host: default.opentaproject.org
      http:
        paths:
          - path: /
            backend:
              serviceName: default-http-backend
              servicePort: 80
---
apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  name: opentaproject-org-ingress
  namespace: opentaproject-org
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  tls:
    - secretName: opentaproject-org-certificate-tls
      hosts:
        - opentaproject.org
        - "*.opentaproject.org"
  rules:
    - host: opentaproject.org
      http:
        paths:
          - path: /
            backend:
              serviceName: wildcard-demo
              servicePort: http
    - host: "*.opentaproject.org"
      http:
        paths:
          - path: /
            backend:
              serviceName: wildcard-demo
              servicePort: http
