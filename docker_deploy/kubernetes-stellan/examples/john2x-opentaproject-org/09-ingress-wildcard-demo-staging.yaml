apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  name: opentaproject-org-ingress
  namespace: opentaproject-org
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  tls:
    - secretName: opentaproject-org-staging-tls
      hosts:
        - opentaproject.org
        - "*.opentaproject.org"

  rules:
    - host: opentaproject.org
      http:
        paths:
          - path: /
            backend:
              serviceName: wildcard-demo
              servicePort: 80
    - host: "*.opentaproject.org"
      http:
        paths:
          - path: /
            backend:
              serviceName: wildcard-demo
              servicePort: 80
