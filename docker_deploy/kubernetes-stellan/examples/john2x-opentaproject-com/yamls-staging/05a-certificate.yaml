apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: opentaproject-com-staging-certificate
  namespace: opentaproject-com
spec:
  secretName: opentaproject-com-staging-tls
  issuerRef:
    # The issuer created previously
    name: letsencrypt-staging
    kind: Issuer
  commonName: opentaproject.com
  dnsNames:
    - opentaproject.com
    - "*.opentaproject.com"
