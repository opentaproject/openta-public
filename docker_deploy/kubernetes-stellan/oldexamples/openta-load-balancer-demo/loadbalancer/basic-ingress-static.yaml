apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: basic-ingress
  annotations:
    #kubernetes.io/ingress.global-static-ip-name: "pts-address"
    #networking.gke.io/managed-certificates: pts-certificate
    kubernetes.io/ingress.class: nginx
    #nginx.ingress.kubernetes.io/ssl-redirect: "false"

spec:
  rules:
  #- host: pinetreesquare.com
  - http:
      paths:
      - path: /web2
        backend:
          serviceName: web2
          servicePort: 8080
      - path: /mynginx
        backend:
          serviceName: mynginx
          servicePort: 8080
      - path: /v212b
        backend:
          serviceName: v212b
          servicePort: 8080
      - path: /
        backend:
          serviceName: weba
          servicePort: 8080
