apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.17.0 (a74acad)
  creationTimestamp: null
  labels:
    io.kompose.service: subpath123
    name: subpath123
  name: subpath123
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      name: subpath123
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.service: subpath123
        name: subpath123
    spec:
      containers:
        - name: web
          args:
            - gunicorn
            - backend.wsgi:application
            - --bind
            - 0.0.0.0:8000
            - --env
            - DJANGO_SETTINGS_MODULE=backend.settings_production_docker
            - --timeout
            - "300"
          env:
          - name: WEB_CONCURRENCY
            value: "10"
          - name: OPENTA_SUBPATH
            value: "subpath123"
          - name: OPENTA_VERSION
            value: "fim770v6_f50c17d1"
          image: s53ostlund/openta:fim770v6_f50c17d1
          imagePullPolicy: Always
          volumeMounts:
          - mountPath: /srv/openta/django/backend/media
            name: site-data
            subPath: media
          - mountPath: /srv/openta/exercises
            name: site-data
            subPath: exercises
          - mountPath: /tmp
            name: tmp
          workingDir: /srv/openta/django/backend/
          resources:
            requests:
              cpu: "0.05"
              memory: "700Mi"

        - image: postgres:12-alpine
          name: db
          env:
          - name: PGDATA
            value: "/var/lib/postgresql/data/db"
          - name: POSTGRES_PASSWORD
            value: supersecret
          volumeMounts:
          - mountPath: /var/lib/postgresql/data
            name: site-data
            subPath: database
          resources:
            requests:
              cpu: "0.05"
              memory: "256Mi"

        - image: s53ostlund/nginx:fim770v6_f50c17d1
          imagePullPolicy: Always
          name: nginx
          command: ["/bin/sh"]
          args: ["-c", "envsubst '$OPENTA_SUBPATH $USE_SSL' < /etc/nginx/conf.d/default.template > /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"]
          env:
          - name: OPENTA_SUBPATH
            value: "/subpath123"
          - name: USE_SSL
            value: "False"
          ports:
          - containerPort: 8080
          volumeMounts:
          - mountPath: /srv/openta/django/backend/media
            name: site-data
            subPath: media
          - mountPath: /srv/openta/exercises
            name: site-data
            subPath: exercises
          resources:
            requests:
              cpu: "0.05"
              memory: "128Mi"

        - image: redis:3.2.0
          name: redis
          volumeMounts:
          - mountPath: /data
            name: site-data
            subPath: redis
          resources:
            requests:
              cpu: "0.05"
              memory: "128Mi"

        - name: rqworker
          args:
            - python
            - manage.py
            - rqworker
          image: s53ostlund/openta:fim770v6_f50c17d1
          imagePullPolicy: Always
          volumeMounts:
          - mountPath: /srv/openta/django/backend/media
            name: site-data
            subPath: media
          - mountPath: /tmp
            name: tmp
          workingDir: /srv/openta/django/backend/
          resources:
            requests:
              cpu: "0.05"
              memory: "128Mi"
      imagePullSecrets:
        - name: dockerkey
      restartPolicy: Always
      volumes:
      - name: site-data
        persistentVolumeClaim:
          claimName: subpath123-data
      - name: tmp
        emptyDir: {}

status: {}
