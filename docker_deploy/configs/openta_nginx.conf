upstream openta {
    server web:8000;
}

server {
    # the port your site will be served on

    listen 80;
    charset     utf-8;

    # max upload size
    client_max_body_size 75M;   # adjust to taste
    gzip on;
    gzip_types
	text/css
	text/javascript
	text/xml
	text/plain
	application/javascript
	application/x-javascript
	application/json;

    error_page 404 @notfound;
    location @notfound {
	root /srv/errors;
	rewrite ^(.*)$ /404.html break;
    }

    location ~ ^/(apple-touch-icon|browserconfig|favicon|mstile|android-chrome|safari-pinned)(.*)\.(png|xml|ico)$ {
    	root /usr/share/nginx/html;
    }

    location /static {
        alias /srv/openta/django/backend/deploystatic;
    }

    location /taskresults/ {
        internal;
        alias /srv/openta/django/backend/media/taskresults/;
    }

    location /exerciseasset/ {
        internal;
        alias /srv/openta/exercises/;
        expires 10d;
    }

    location /answerimages/ {
        internal;
        alias /srv/openta/django/backend/media/answerimages/;
    }
    location /media/public/ {
        alias /srv/openta/django/backend/media/public/;
    }
    location /media/CACHE/ {
        internal;
        alias /srv/openta/django/backend/media/CACHE/;
        expires 10d;
    }
    location / {
        proxy_pass http://openta;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
    error_page 502 @maintenance;
    location @maintenance {
        root /srv/openta;
        rewrite ^(.*)$ /maintenance/maintenance.html break;
    }

}
