upstream localhost {
    server localhost:8000;
}

server {
    # the port your site will be served on

    listen 8080;
    charset     utf-8;
    # max upload size
    client_max_body_size 300M ;
    server_name ~^((?<subdomain>.+)\.)?(?<domain>.+)\.(?<tld>.*);

    
    location ~ /.*\.php.*$ {
    	deny all;
 	}

    
    location ~ /(.*icon.*)$ {
	alias /deploystatic/icons/$1;
	index  index.html index.htm;
	break;
	}
     
     
    location ~ /\..*$ {
    	deny all;
 	}

    if ($host = 'opentaproject.org' )
       {
           rewrite ^ https://openta-development.github.io/info/ permanent;
       }

    if ($host = 'opentaproject.com' )
       {
           rewrite ^ https://openta-development.github.io/info/ permanent;
       }

   location = /robots.txt {
   	add_header Content-Type text/plain;
   	return 200 "User-agent: *\nAllow : /pages\nDisallow: /\n";
	}
    

    location ~ /static/(.*) {
	alias /deploystatic/$1;
	index  index.html index.htm;
	break;
	}


    location ~ /deploystatic/(.*) {
	alias /deploystatic/$1;
	index  index.html index.htm;
	break;
	}


    location ~ /CACHE/(.*) {
	alias /subdomain-data/CACHE/$1;
	index  index.html index.htm;
	break;
	}
    
    location ~ /pages/(.*) {
	# map https://examples.opentaproject.org/pages  to local pages
	alias /subdomain-data/$subdomain/pages/$1 ;
        index  index.html index.htm;
	break;
	}


    
    location ~ /docs/(.*) {
	# map https://examples.opentaproject.com/docs to global sphinx docs
	alias /docs/$1 ;
        index  index.html index.htm;
	}

    location ~ (.*)/uritest/(.*) {
	access_log off;
	add_header Content-Type text/plain;
        return 200 "$subdomain $domain $tld $host $uri $request_uri" ;
	#root   /html;
	#root /subdomain-data/examples/pages ;
	#alias /subdomain-data/$1/pages/$2 ;
        #index  index.html index.htm;
	#break;
	}

    
    
    location /health {
        access_log off;
	add_header Content-Type text/plain;
        return 200 $uri ;
       }
  
    
    location ~ /health/(.*) {
        access_log off;
	add_header Content-Type text/plain;
        return 200 $uri ;
       }

    location ~ workqueue/taskresults/(.*) {
	internal;
        alias /subdomain-data/workqueue/taskresults/$1 ;
        expires 10d;
        }

    
    location ~ (.*)/media/(.*) {
 	internal;
        alias /subdomain-data/$1/media/$2 ;
        expires 10d;
        }
    
    location ~ (.*)/exerciseasset/(.*) {
        internal;
        alias /subdomain-data/$1/exercises/$2 ;
        expires 10d;
        }
    
    
   
    
    #location /([^/]+)/exerciseasset/(.*) {
    #    internal;
    #    alias /subdomain-data/$1/exercises/$2 ;
    #    expires 10d;
    #    }
   
     
    
    location ~ (.*)/answerimages/(.*) {
        internal;
        alias /subdomain-data/$1/media/answerimages/$2 ;
        expires 10d;
        }



    location ~ (.*)/taskresults/(.*) {
        internal;
        alias /subdomain-data/$1/media/taskresults/$2 ;
        expires 10d;
	}
    

    location  ~ "/([^/]{3,13})/exercises/(.*)" { # avoid matchin subdomain-data
        internal;
        alias /subdomain-data/$1/exercises/$2 ;
        expires 10d;
        }

  
   

    location  / {
        proxy_pass http://localhost;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

	
    location @notfound {
	return  200 $uri ;
	add_header Content-Type text/plain;
    }


    error_page 502 @maintenance;
    location @maintenance {
        root /usr/share/nginx/html;
    }

}
