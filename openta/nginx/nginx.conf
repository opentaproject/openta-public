upstream openta {
    server localhost:8000;
}

server {
    # the port your site will be served on

    listen 8080;
    charset     utf-8;

    # max upload size
    client_max_body_size 500M;   # adjust to taste
    gzip on;
    gzip_types
	text/css
	text/javascript
	text/xml
	text/plain
	application/javascript
	application/x-javascript
	application/json;

    error_page 404 @notfound;
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log error;
    location @notfound {
	return  200 $uri ;
	add_header Content-Type text/plain;
        #root /srv/errors;
        #rewrite ^(.*)$ /404.html break;
    }


    #location ~ ^/(apple-touch-icon|browserconfig|favicon|mstile|android-chrome|safari-pinned)(.*)\.(png|xml|ico)$ {
    #	root /usr/share/nginx/html;
    #}

    #location /v300/static {
    #    alias /srv/openta/django/backend/deploystatic;
    #}

    location /v300/taskresults/ {
        internal;
        alias /srv/multicourse/media/taskresults/;
    }
   
    
    location /v300/exercises/ {
        internal;
        alias /srv/multicourse/exercises/;
        expires 10d;
    }

    location /v300/exerciseasset/ {
        internal;
        alias /srv/multicourse/exercises/;
        expires 10d;
    }

    location /v300/answerimages/ {
        internal;
        alias /srv/multicourse/media/answerimages/;
    }

    location /v300/media/CACHE/ {
        internal;
        alias /srv/multicourse/media/CACHE/;
        expires 10d;
    }

    location /v300/media/ {
        alias /srv/multicourse/media/;
	expires 10d;
    }

    location /health {
        access_log off;
        return 200 'OK';
       }

    location = / {
	access_log off;
        return 200 'OK';  # THIS IS NECESSARY FOR GOOGLE HEALTH CHECK
        add_header Content-Type text/plain;
        access_log off;
    }
    location /v300/ {
        set $COND "";
        set $TRUE "1";
        if ($TRUE = False) {
            set $COND "ENABLED";
        }
        if ($http_x_forwarded_proto = "http") {
            set $COND "${COND}_AND_HTTP";
        }
        if ($COND = "ENABLED_AND_HTTP") {
            return 301 https://$host$request_uri;
        }
        proxy_pass http://openta;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        # proxy_set_header X-Forwarded-Host $host:443;
        proxy_redirect off;
    }
    location = /v300 {
        proxy_pass http://openta;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        # proxy_set_header X-Forwarded-Host $host:443;
        proxy_redirect off;
    }
    error_page 502 @maintenance;
    location @maintenance {
        root /srv/openta;
        rewrite ^(.*)$ /maintenance/maintenance.html break;
    }

}

